##############################################
# ACCESO SALA - Entradas, Salidas, Doble toque y Puerta abierta
# Entidades base:
#  - binary_sensor.puerta_entrada   (ON = abierta)
#  - binary_sensor.motion_sala_1_occupancy    (ON = hay movimiento)
##############################################

homeassistant:
  customize:
    # ---- Flags ----
    input_boolean.flag_acceso_entro:
      friendly_name: "Flag: Alguien entró (últimos 10m)"
      icon: mdi:login
    input_boolean.flag_acceso_salio:
      friendly_name: "Flag: Alguien salió (últimos 10m)"
      icon: mdi:logout
    input_boolean.flag_puerta_abierta_x_min:
      friendly_name: "Flag: Puerta abierta demasiado tiempo"
      icon: mdi:door-open
    input_boolean.sala_arribo_puerta_activo:
      friendly_name: "Sala - Arribo por puerta activo"
      icon: mdi:door-open
    # ---- Configurable ----
    input_number.puerta_abierta_minutos:
      friendly_name: "Minutos para considerar 'puerta abierta'"
      icon: mdi:timer-outline
      unit_of_measurement: "min"
    input_number.sala_arribo_hold_seconds:
      friendly_name: "Sala - Pausa post arribo"
      icon: mdi:timer-sand
      unit_of_measurement: "s"
    timer.sala_arribo_puerta_hold:
      friendly_name: "Sala - Hold arribo por puerta"
      icon: mdi:timer-lock-outline
    # ---- Automations ----
    automation.acceso_flag_entro_10m:
      friendly_name: "Acceso · Detectar entrada"
      description: "Se activa si se abre la puerta y no hubo movimiento en los últimos 60s. Previene falsos positivos al salir y volver a entrar rápido."
    automation.acceso_flag_salio_10m:
      friendly_name: "Acceso · Detectar salida"
      description: "Se activa si hay movimiento y se abre la puerta. Representa una salida del ambiente."
    automation.acceso_puerta_abierta_x_min:
      friendly_name: "Acceso · Puerta abierta mucho tiempo"
      description: "Si la puerta permanece abierta más de X minutos, levanta flag y envía notificación."
    automation.acceso_puerta_cerrada_resetea_flag:
      friendly_name: "Acceso · Resetear flag al cerrar"
      description: "Cuando se cierra la puerta, se apaga la flag de puerta abierta."
    automation.acceso_double_open_puerta:
      friendly_name: "Acceso · Doble apertura rápida"
      description: "Detecta dos aperturas consecutivas en menos de 2 s. Ideal para acciones rápidas como activar alarma."

    automation.acceso_arribo_sala_por_puerta:
      friendly_name: "Acceso - Arribo sala por puerta"
      description: "Cuando se confirma una entrada, toma control temporal de la sala y ejecuta el script visual de bienvenida."
    automation.acceso_arribo_sala_hold_fin:
      friendly_name: "Acceso - Fin hold arribo sala"
      description: "Devuelve el control de la sala a Smart Lights cuando termina la pausa post arribo."
    automation.acceso_arribo_sala_recovery:
      friendly_name: "Acceso - Recovery arribo sala"
      description: "Reconcilia el lock de arribo de sala despues de reiniciar Home Assistant."
    script.puerta_principal_arribo_sala_start:
      friendly_name: "Puerta principal - iniciar arribo sala"
      description: "Worker tecnico: bloquea Smart Lights Sala, corre el script visual y arranca la pausa."
    script.puerta_principal_arribo_sala_finish:
      friendly_name: "Puerta principal - finalizar arribo sala"
      description: "Worker tecnico: libera la sala y entrega el estado a Smart Lights."

##############################################
# Helpers
##############################################
input_boolean:
  flag_acceso_entro:
  flag_acceso_salio:
  flag_puerta_abierta_x_min:
  sala_arribo_puerta_activo:

input_number:
  puerta_abierta_minutos:
    min: 1
    max: 60
    step: 1
    mode: box
    initial: 5   # valor por defecto
  sala_arribo_hold_seconds:
    min: 0
    max: 180
    step: 5
    mode: box
    initial: 45

timer:
  sala_arribo_puerta_hold:
    duration: "00:00:45"

##############################################
# Workers
##############################################

# Sensores binarios “de evento” (auto-off 10m)
##############################################
script:
  puerta_principal_arribo_sala_start:
    alias: Puerta principal - iniciar arribo sala
    mode: restart
    sequence:
      - variables:
          arrival_owner: puerta_principal_arribo
          arrival_token: "puerta_principal_arribo_{{ now().timestamp() }}"
          hold_seconds: "{{ states('input_number.sala_arribo_hold_seconds') | int(45) }}"
          protected_by_other: >-
            {{ is_state('input_boolean.light_transition_sala_protected', 'on')
               and states('input_text.light_transition_sala_owner') != arrival_owner }}
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.yendo_a_dormir
                state: "off"
              - condition: template
                value_template: "{{ not protected_by_other }}"
            sequence:
              - service: input_boolean.turn_on
                target: { entity_id: input_boolean.sala_arribo_puerta_activo }
              - service: timer.cancel
                target:
                  entity_id:
                    - timer.sala_arribo_puerta_hold
                    - timer.smart_light_sala_idle_timeout
                    - timer.smart_light_sala_dim_notice
                    - timer.smart_light_sala_restore_window
              - service: script.smart_light_sala_cancel_motion_runtime
              - service: script.light_transition_claim_area
                data:
                  area_key: sala_de_estar
                  owner: "{{ arrival_owner }}"
                  token: "{{ arrival_token }}"
                  protected: true
                  force: true
              - condition: template
                value_template: >-
                  {{ states('input_text.light_transition_sala_owner') == arrival_owner
                     and states('input_text.light_transition_sala_token') == arrival_token }}
              - service: script.smart_light_sala_set_state
                data: { target_state: ACTIVE }
              - service: system_log.write
                data:
                  level: info
                  message: "puerta_principal: arribo sala activo, token={{ arrival_token }}"
              - service: script.sala_arribo_puerta
              - service: timer.start
                target: { entity_id: timer.sala_arribo_puerta_hold }
                data:
                  duration: >-
                    {% set sec = hold_seconds | int(45) %}
                    {{ '%02d:%02d:%02d' | format(sec // 3600, (sec % 3600) // 60, sec % 60) }}
        default:
          - service: system_log.write
            data:
              level: info
              message: >-
                puerta_principal: arribo sala ignorado. yendo_a_dormir={{ states('input_boolean.yendo_a_dormir') }},
                protected={{ states('input_boolean.light_transition_sala_protected') }},
                owner={{ states('input_text.light_transition_sala_owner') }}

  puerta_principal_arribo_sala_finish:
    alias: Puerta principal - finalizar arribo sala
    mode: restart
    sequence:
      - variables:
          arrival_owner: puerta_principal_arribo
          current_token: "{{ states('input_text.light_transition_sala_token') }}"
      - service: timer.cancel
        target: { entity_id: timer.sala_arribo_puerta_hold }
      - service: script.light_transition_release_area
        data:
          area_key: sala_de_estar
          owner: "{{ arrival_owner }}"
          token: "{{ current_token }}"
      - service: input_boolean.turn_off
        target: { entity_id: input_boolean.sala_arribo_puerta_activo }
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.yendo_a_dormir
                state: "off"
              - condition: state
                entity_id: input_boolean.smart_lights_sala
                state: "on"
              - condition: state
                entity_id: input_boolean.modo_cine
                state: "off"
              - condition: state
                entity_id: binary_sensor.motion_sala
                state: "on"
            sequence:
              - service: script.smart_light_sala_set_state
                data: { target_state: ACTIVE }
              - service: system_log.write
                data:
                  level: info
                  message: "puerta_principal: arribo finalizado con motion activo; Smart Lights queda ACTIVE sin reaplicar mood."
          - conditions:
              - condition: state
                entity_id: input_boolean.yendo_a_dormir
                state: "off"
              - condition: state
                entity_id: input_boolean.smart_lights_sala
                state: "on"
              - condition: state
                entity_id: input_boolean.modo_cine
                state: "off"
              - condition: state
                entity_id: binary_sensor.motion_sala
                state: "off"
            sequence:
              - service: script.smart_light_sala_enter_idle_countdown
              - service: system_log.write
                data:
                  level: info
                  message: "puerta_principal: arribo finalizado sin motion; Smart Lights entra en idle countdown."

##############################################
# Sensores binarios de evento (auto-off 10m)
##############################################
template:
  - trigger:
      - platform: state
        entity_id: binary_sensor.puerta_entrada
        to: "on"
    binary_sensor:
      - name: "evento_acceso_entro"
        unique_id: evento_acceso_entro
        state: >
          {{ is_state('binary_sensor.puerta_entrada','on')
             and is_state('binary_sensor.motion_sala_1_occupancy','off') }}
        icon: mdi:login
        auto_off: "00:10:00"
      - name: "evento_acceso_salio"
        unique_id: evento_acceso_salio
        state: >
          {{ is_state('binary_sensor.puerta_entrada','on')
             and is_state('binary_sensor.motion_sala_1_occupancy','on') }}
        icon: mdi:logout
        auto_off: "00:10:00"

##############################################
# Automations
##############################################
automation:

  # --- ARRIBO SALA / PUERTA ---
  - id: acceso_arribo_sala_por_puerta
    alias: acceso_arribo_sala_por_puerta
    mode: restart
    trigger:
      - platform: state
        entity_id: input_boolean.flag_acceso_entro
        to: "on"
    action:
      - service: script.puerta_principal_arribo_sala_start

  - id: acceso_arribo_sala_hold_fin
    alias: acceso_arribo_sala_hold_fin
    mode: restart
    trigger:
      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.sala_arribo_puerta_hold
    action:
      - service: script.puerta_principal_arribo_sala_finish

  - id: acceso_arribo_sala_recovery
    alias: acceso_arribo_sala_recovery
    mode: single
    trigger:
      - platform: homeassistant
        event: start
    condition:
      - condition: state
        entity_id: input_boolean.sala_arribo_puerta_activo
        state: "on"
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: timer.sala_arribo_puerta_hold
                state: "active"
              - condition: state
                entity_id: input_boolean.yendo_a_dormir
                state: "off"
            sequence:
              - service: script.light_transition_claim_area
                data:
                  area_key: sala_de_estar
                  owner: puerta_principal_arribo
                  token: "puerta_principal_arribo_recovery_{{ now().timestamp() }}"
                  protected: true
                  force: true
        default:
          - service: script.puerta_principal_arribo_sala_finish

  # --- ENTRÓ ---
  - id: acceso_flag_entro_10m
    alias: acceso_flag_entro_10m
    mode: restart
    trigger:
      - platform: state
        entity_id: binary_sensor.puerta_entrada
        to: "on"
    # Evita detectar "entrada" si hubo movimiento hace < 60s (salida reciente)
    condition:
      - condition: template
        value_template: >
          {{ (as_timestamp(now()) - as_timestamp(states.binary_sensor.motion_sala_1_occupancy.last_changed)) > 60 }}
      - condition: state
        entity_id: binary_sensor.motion_sala_1_occupancy
        state: "off"
    action:
      - service: input_boolean.turn_on
        target: { entity_id: input_boolean.flag_acceso_entro }
      - delay: "00:10:00"
      - service: input_boolean.turn_off
        target: { entity_id: input_boolean.flag_acceso_entro }

  # --- SALIÓ ---
  - id: acceso_flag_salio_10m
    alias: acceso_flag_salio_10m
    mode: restart
    trigger:
      - platform: state
        entity_id: binary_sensor.puerta_entrada
        to: "on"
    condition:
      - condition: state
        entity_id: binary_sensor.motion_sala_1_occupancy
        state: "on"
    action:
      - service: input_boolean.turn_on
        target: { entity_id: input_boolean.flag_acceso_salio }
      - delay: "00:10:00"
      - service: input_boolean.turn_off
        target: { entity_id: input_boolean.flag_acceso_salio }

  # --- PUERTA ABIERTA X MINUTOS ---
  - id: acceso_puerta_abierta_x_min
    alias: acceso_puerta_abierta_x_min
    mode: restart
    trigger:
      - platform: state
        entity_id: binary_sensor.puerta_entrada
        to: "on"
    variables:
      minutos: "{{ states('input_number.puerta_abierta_minutos')|int(5) }}"
    action:
      - wait_for_trigger:
          - platform: state
            entity_id: binary_sensor.puerta_entrada
            to: "off"
        timeout:
          minutes: "{{ minutos }}"
        continue_on_timeout: true
      - choose:
          - conditions: "{{ wait.completed is false and is_state('binary_sensor.puerta_entrada','on') }}"
            sequence:
              - service: input_boolean.turn_on
                target: { entity_id: input_boolean.flag_puerta_abierta_x_min }
              - service: notify.hernan  # <— Cambiar por tu notify
                data:
                  title: "Puerta abierta {{ minutos }} min"
                  message: "La puerta de entrada quedó abierta por {{ minutos }} min."
                  data:
                    channel: "security"
                    tag: "puerta_abierta"
                    sticky: true
                    importance: high

  # --- RESET FLAG AL CERRAR ---
  - id: acceso_puerta_cerrada_resetea_flag
    alias: acceso_puerta_cerrada_resetea_flag
    trigger:
      - platform: state
        entity_id: binary_sensor.puerta_entrada
        to: "off"
    action:
      - service: input_boolean.turn_off
        target: { entity_id: input_boolean.flag_puerta_abierta_x_min }

  # --- DOBLE APERTURA / CIERRE ---
  - id: acceso_double_open_puerta
    alias: acceso_double_open_puerta
    mode: single
    max_exceeded: silent
    trigger:
      - platform: state
        entity_id: binary_sensor.puerta_entrada
        to: 
          - "on"
          - "off"
    condition: []
    action:
      - wait_for_trigger:
          - platform: state
            entity_id: binary_sensor.puerta_entrada
            to: "{{ trigger.to_state.state }}"
        timeout:
          seconds: 2
        continue_on_timeout: false
      - service: notify.hernan
        data:
          title: "Doble accion detectada"
          message: "Se detectó doble {{ 'apertura' if trigger.to_state.state == 'on' else 'cierre' }} rápida. Activando alarma."

