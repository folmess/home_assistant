# =========================
# Script: Gradual Brightness Change
# script: restore from snapshot with gradual brightness change
# Allows gradual transition of one or more lights to a target brightness over a specified time
# =========================

input_text:
  light_transition_sala_owner:
    name: Light Transition Sala - Owner
    max: 255
  light_transition_sala_token:
    name: Light Transition Sala - Token
    max: 255
  light_transition_cocina_owner:
    name: Light Transition Cocina - Owner
    max: 255
  light_transition_cocina_token:
    name: Light Transition Cocina - Token
    max: 255

input_boolean:
  light_transition_sala_protected:
    name: Light Transition Sala - Protected
    icon: mdi:lock-outline
  light_transition_cocina_protected:
    name: Light Transition Cocina - Protected
    icon: mdi:lock-outline

input_datetime:
  light_transition_sala_last_update:
    name: Light Transition Sala - Last update
    has_date: true
    has_time: true
  light_transition_cocina_last_update:
    name: Light Transition Cocina - Last update
    has_date: true
    has_time: true

script:
  light_transition_claim_area:
    alias: Light Transition - Claim area
    mode: parallel
    fields:
      area_key:
        name: Area key
        selector:
          text:
      owner:
        name: Owner
        selector:
          text:
      token:
        name: Token
        selector:
          text:
      protected:
        name: Protected
        default: false
        selector:
          boolean:
      force:
        name: Force
        default: false
        selector:
          boolean:
    sequence:
      - variables:
          area_norm: >-
            {% set a = area_key | default('') %}
            {% if a in ['sala', 'sala_de_estar'] %}sala{% elif a == 'cocina' %}cocina{% else %}{{ a }}{% endif %}
          owner_value: "{{ owner | default('') }}"
          token_value: "{{ token | default('') }}"
          protected_value: "{{ protected | default(false) | bool }}"
          force_value: "{{ force | default(false) | bool }}"
          owner_entity: >-
            {% if area_norm == 'sala' %}input_text.light_transition_sala_owner{% elif area_norm == 'cocina' %}input_text.light_transition_cocina_owner{% endif %}
          token_entity: >-
            {% if area_norm == 'sala' %}input_text.light_transition_sala_token{% elif area_norm == 'cocina' %}input_text.light_transition_cocina_token{% endif %}
          protected_entity: >-
            {% if area_norm == 'sala' %}input_boolean.light_transition_sala_protected{% elif area_norm == 'cocina' %}input_boolean.light_transition_cocina_protected{% endif %}
          last_update_entity: >-
            {% if area_norm == 'sala' %}input_datetime.light_transition_sala_last_update{% elif area_norm == 'cocina' %}input_datetime.light_transition_cocina_last_update{% endif %}
          current_owner: "{{ states(owner_entity) if owner_entity | length > 0 else '' }}"
          current_protected: "{{ is_state(protected_entity, 'on') if protected_entity | length > 0 else false }}"
          lock_is_free: "{{ current_owner in ['', 'unknown', 'unavailable', 'none'] }}"
          can_claim: "{{ owner_entity | length > 0 and token_entity | length > 0 and ((force_value | bool) or (lock_is_free | bool) or not (current_protected | bool) or current_owner == owner_value) }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ can_claim }}"
            sequence:
              - service: input_text.set_value
                target: { entity_id: "{{ owner_entity }}" }
                data: { value: "{{ owner_value }}" }
              - service: input_text.set_value
                target: { entity_id: "{{ token_entity }}" }
                data: { value: "{{ token_value }}" }
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ protected_value | bool }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target: { entity_id: "{{ protected_entity }}" }
                default:
                  - service: input_boolean.turn_off
                    target: { entity_id: "{{ protected_entity }}" }
              - service: input_datetime.set_datetime
                target: { entity_id: "{{ last_update_entity }}" }
                data:
                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        default:
          - service: system_log.write
            data:
              level: info
              message: >-
                light_transition_claim_area blocked: area={{ area_key }}, owner={{ owner_value }}, current_owner={{ current_owner }}, protected={{ current_protected }}

  light_transition_release_area:
    alias: Light Transition - Release area
    mode: parallel
    fields:
      area_key:
        name: Area key
        selector:
          text:
      owner:
        name: Owner
        selector:
          text:
      token:
        name: Token
        selector:
          text:
      force:
        name: Force
        default: false
        selector:
          boolean:
    sequence:
      - variables:
          area_norm: >-
            {% set a = area_key | default('') %}
            {% if a in ['sala', 'sala_de_estar'] %}sala{% elif a == 'cocina' %}cocina{% else %}{{ a }}{% endif %}
          owner_value: "{{ owner | default('') }}"
          token_value: "{{ token | default('') }}"
          force_value: "{{ force | default(false) | bool }}"
          owner_entity: >-
            {% if area_norm == 'sala' %}input_text.light_transition_sala_owner{% elif area_norm == 'cocina' %}input_text.light_transition_cocina_owner{% endif %}
          token_entity: >-
            {% if area_norm == 'sala' %}input_text.light_transition_sala_token{% elif area_norm == 'cocina' %}input_text.light_transition_cocina_token{% endif %}
          protected_entity: >-
            {% if area_norm == 'sala' %}input_boolean.light_transition_sala_protected{% elif area_norm == 'cocina' %}input_boolean.light_transition_cocina_protected{% endif %}
          last_update_entity: >-
            {% if area_norm == 'sala' %}input_datetime.light_transition_sala_last_update{% elif area_norm == 'cocina' %}input_datetime.light_transition_cocina_last_update{% endif %}
          owner_matches: "{{ owner_value == '' or states(owner_entity) == owner_value }}"
          token_matches: "{{ token_value == '' or states(token_entity) == token_value }}"
          can_release: "{{ owner_entity | length > 0 and token_entity | length > 0 and ((force_value | bool) or ((owner_matches | bool) and (token_matches | bool))) }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ can_release }}"
            sequence:
              - service: input_text.set_value
                target: { entity_id: "{{ owner_entity }}" }
                data: { value: "" }
              - service: input_text.set_value
                target: { entity_id: "{{ token_entity }}" }
                data: { value: "" }
              - service: input_boolean.turn_off
                target: { entity_id: "{{ protected_entity }}" }
              - service: input_datetime.set_datetime
                target: { entity_id: "{{ last_update_entity }}" }
                data:
                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        default:
          - service: system_log.write
            data:
              level: info
              message: >-
                light_transition_release_area ignored: area={{ area_key }}, owner={{ owner_value }}, token={{ token_value }}

  light_transition_cancel_area:
    alias: Light Transition - Cancel area
    mode: parallel
    fields:
      area_key:
        name: Area key
        selector:
          text:
      owner:
        name: Owner
        default: cancel
        selector:
          text:
      token:
        name: Token
        selector:
          text:
      force:
        name: Force
        default: false
        selector:
          boolean:
    sequence:
      - variables:
          area_norm: >-
            {% set a = area_key | default('') %}
            {% if a in ['sala', 'sala_de_estar'] %}sala{% elif a == 'cocina' %}cocina{% else %}{{ a }}{% endif %}
          owner_value: "{{ owner | default('cancel') }}"
          token_value: "{{ token | default('cancel_' ~ now().timestamp()) }}"
          force_value: "{{ force | default(false) | bool }}"
          owner_entity: >-
            {% if area_norm == 'sala' %}input_text.light_transition_sala_owner{% elif area_norm == 'cocina' %}input_text.light_transition_cocina_owner{% endif %}
          token_entity: >-
            {% if area_norm == 'sala' %}input_text.light_transition_sala_token{% elif area_norm == 'cocina' %}input_text.light_transition_cocina_token{% endif %}
          protected_entity: >-
            {% if area_norm == 'sala' %}input_boolean.light_transition_sala_protected{% elif area_norm == 'cocina' %}input_boolean.light_transition_cocina_protected{% endif %}
          last_update_entity: >-
            {% if area_norm == 'sala' %}input_datetime.light_transition_sala_last_update{% elif area_norm == 'cocina' %}input_datetime.light_transition_cocina_last_update{% endif %}
          current_owner: "{{ states(owner_entity) if owner_entity | length > 0 else '' }}"
          current_protected: "{{ is_state(protected_entity, 'on') if protected_entity | length > 0 else false }}"
          can_cancel: "{{ owner_entity | length > 0 and token_entity | length > 0 and ((force_value | bool) or not (current_protected | bool) or current_owner == owner_value) }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ can_cancel }}"
            sequence:
              - service: input_text.set_value
                target: { entity_id: "{{ owner_entity }}" }
                data: { value: "{{ owner_value }}" }
              - service: input_text.set_value
                target: { entity_id: "{{ token_entity }}" }
                data: { value: "{{ token_value }}" }
              - service: input_boolean.turn_off
                target: { entity_id: "{{ protected_entity }}" }
              - service: input_datetime.set_datetime
                target: { entity_id: "{{ last_update_entity }}" }
                data:
                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        default:
          - service: system_log.write
            data:
              level: info
              message: >-
                light_transition_cancel_area blocked: area={{ area_key }}, owner={{ owner_value }}, current_owner={{ current_owner }}, protected={{ current_protected }}

  gradual_brightness_change:
    alias: Gradual Brightness Change
    mode: parallel
    fields:
      target:
        name: Target
        description: Select areas, devices, entities or labels containing lights
        required: true
        selector:
          target:
            entity:
              domain: light
      target_brightness:
        name: Target Brightness (%)
        description: Target brightness percentage (0-100%)
        selector:
          number:
            min: 0
            max: 100
            step: 1
            unit_of_measurement: "%"
      transition_time:
        name: Transition Time (seconds)
        description: Total time for the transition
        selector:
          number:
            min: 0.1
            max: 300
            step: 0.1
            unit_of_measurement: "s"
      steps:
        name: Number of Steps
        description: Number of steps for the gradual change (more steps = smoother transition)
        selector:
          number:
            min: 1
            max: 50
            step: 1
      queue_mode:
        name: Modo de ejecución
        description: Paralelo (por defecto) o en cola (secuencial)
        default: parallel
        selector:
          select:
            mode: dropdown
            options:
              - label: Paralelo
                value: parallel
              - label: En cola
                value: queue
      include_off_lights:
        name: Incluir luces apagadas
        description: Controla si se incluyen luces que están apagadas al iniciar la transición.
        default: true
        selector:
          boolean:
      flag_entity:
        name: Run flag
        description: Optional input_boolean that stays 'on' while the ramp should continue.
        selector:
          entity:
            domain: input_boolean
      lock_token_entity:
        name: Lock token entity
        description: Optional input_text token entity used to cancel stale workers.
        selector:
          entity:
            domain: input_text
      lock_token:
        name: Lock token
        description: Expected token value while the transition is allowed to run.
        selector:
          text:
    sequence:
      - variables:
          target_entities_raw: "{{ target.entity_id | default([]) }}"
          target_devices_raw: "{{ target.device_id | default([]) }}"
          target_areas_raw: "{{ target.area_id | default([]) }}"
          target_entities: "{{ target_entities_raw if (target_entities_raw is iterable and target_entities_raw is not string) else [target_entities_raw] }}"
          target_devices: "{{ target_devices_raw if (target_devices_raw is iterable and target_devices_raw is not string) else [target_devices_raw] }}"
          target_areas: "{{ target_areas_raw if (target_areas_raw is iterable and target_areas_raw is not string) else [target_areas_raw] }}"
          lights_from_devices: >-
            {{ (target_devices | map('device_entities') | list) | sum(start=[]) | select('match', '^light\..*') | list }}
          lights_from_areas: >-
            {{ (target_areas | map('area_entities') | list) | sum(start=[]) | select('match', '^light\..*') | list }}
          direct_lights: >-
            {{ target_entities | select('match', '^light\..*') | list }}
          lights_candidates: >-
            {{ (direct_lights + lights_from_devices + lights_from_areas) | unique | list }}
          lights_list: >-
            {{ expand(lights_candidates) | selectattr('attributes.entity_id', 'undefined') | map(attribute='entity_id') | select('match', '^light\..*') | unique | list }}
          classification: >-
            {% set ns = namespace(dimmable=[], dimmable_on=[], dimmable_off=[], non_dimmable=[], non_dimmable_on=[], non_dimmable_off=[]) %}
            {% for entity_id in lights_list %}
              {% set modes = state_attr(entity_id, 'supported_color_modes') %}
              {% if modes is string %}
                {% set modes_list = [modes | lower] %}
              {% elif modes is iterable %}
                {% set modes_list = modes | map('lower') | list %}
              {% else %}
                {% set modes_list = [] %}
              {% endif %}
              {% set features = state_attr(entity_id, 'supported_features') | int(0) %}
              {% set supports_brightness = (
                'brightness' in modes_list
                or 'hs' in modes_list
                or 'rgb' in modes_list
                or 'rgbw' in modes_list
                or 'rgbww' in modes_list
                or 'color_temp' in modes_list
                or 'white' in modes_list
                or 'xy' in modes_list
                or (((features | int(0)) | bitwise_and(1)) > 0)
              ) %}
              {% if supports_brightness %}
                {% set ns.dimmable = ns.dimmable + [entity_id] %}
                {% if states(entity_id) == 'on' %}
                  {% set ns.dimmable_on = ns.dimmable_on + [entity_id] %}
                {% else %}
                  {% set ns.dimmable_off = ns.dimmable_off + [entity_id] %}
                {% endif %}
              {% else %}
                {% set ns.non_dimmable = ns.non_dimmable + [entity_id] %}
                {% if states(entity_id) == 'on' %}
                  {% set ns.non_dimmable_on = ns.non_dimmable_on + [entity_id] %}
                {% else %}
                  {% set ns.non_dimmable_off = ns.non_dimmable_off + [entity_id] %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ {
              'dimmable': ns.dimmable,
              'dimmable_on': ns.dimmable_on,
              'dimmable_off': ns.dimmable_off,
              'non_dimmable': ns.non_dimmable,
              'non_dimmable_on': ns.non_dimmable_on,
              'non_dimmable_off': ns.non_dimmable_off
            } }}
          include_off: "{{ include_off_lights | default(true) }}"
          dimmable_lights_all: "{{ classification.dimmable }}"
          dimmable_on: "{{ classification.dimmable_on }}"
          dimmable_off: "{{ classification.dimmable_off }}"
          non_dimmable_lights: "{{ classification.non_dimmable }}"
          non_dimmable_on: "{{ classification.non_dimmable_on }}"
          non_dimmable_off_all: "{{ classification.non_dimmable_off }}"
          dimmable_lights: "{{ dimmable_lights_all if include_off else dimmable_on }}"
          non_dimmable_off: "{{ non_dimmable_off_all if include_off else [] }}"
          flag_entity_id: "{{ flag_entity | default('') }}"
          lock_token_entity_id: "{{ lock_token_entity | default('') }}"
          lock_token_value: "{{ lock_token | default('') }}"
          lock_valid: "{{ lock_token_entity_id == '' or states(lock_token_entity_id) == lock_token_value }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ (lights_list | length) == 0 }}"
            sequence:
              - service: system_log.write
                data:
                  level: warning
                  message: "gradual_brightness: no lights resolved from target={{ target | tojson }}"
              - stop: "No target lights"
          - conditions:
              - condition: template
                value_template: "{{ lock_token_entity_id != '' and states(lock_token_entity_id) != lock_token_value }}"
            sequence:
              - stop: "Lock token changed before dispatch"
          - conditions:
              - condition: template
                value_template: "{{ queue_mode == 'parallel' }}"
            sequence:
              - variables:
                  steps_int: "{{ steps | int }}"
                  step_delay_ms: "{{ (((transition_time | float) / (steps | float)) * 1000) | int }}"
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ (target_brightness | float(0)) <= 0 and (non_dimmable_on | length) > 0 and (flag_entity_id == '' or states(flag_entity_id) == 'on') and (lock_token_entity_id == '' or states(lock_token_entity_id) == lock_token_value) }}"
                    sequence:
                      - service: light.turn_off
                        target:
                          entity_id: "{{ non_dimmable_on | join(', ') }}"
              - repeat:
                  for_each: "{{ dimmable_lights }}"
                  sequence:
                    - choose:
                        - conditions:
                            - condition: template
                              value_template: "{{ flag_entity_id != '' and states(flag_entity_id) != 'on' }}"
                          sequence:
                            - stop: "Flag inactive"
                        - conditions:
                            - condition: template
                              value_template: "{{ lock_token_entity_id != '' and states(lock_token_entity_id) != lock_token_value }}"
                          sequence:
                            - stop: "Lock token changed"
                    - service: script.turn_on
                      target:
                        entity_id: script.gradual_brightness_worker
                      data:
                        variables:
                          light: "{{ repeat.item }}"
                          target_brightness: "{{ target_brightness }}"
                          steps: "{{ steps_int }}"
                          step_delay_ms: "{{ step_delay_ms }}"
                          flag_entity: "{{ flag_entity_id }}"
                          lock_token_entity: "{{ lock_token_entity_id }}"
                          lock_token: "{{ lock_token_value }}"
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ (target_brightness | float(0)) > 0 and (non_dimmable_off | length) > 0 and (flag_entity_id == '' or states(flag_entity_id) == 'on') and (lock_token_entity_id == '' or states(lock_token_entity_id) == lock_token_value) }}"
                    sequence:
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: "{{ (transition_time | float(0)) > 0 }}"
                            sequence:
                              - delay:
                                  seconds: "{{ transition_time | float(0) }}"
                      - service: light.turn_on
                        target:
                          entity_id: "{{ non_dimmable_off | join(', ') }}"
              - stop: "Parallel ramp dispatched"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ queue_mode == 'queue' }}"
            sequence:
              - variables:
                  steps_int: "{{ steps | int }}"
                  step_delay_ms: "{{ (((transition_time | float) / (steps | float)) * 1000) | int }}"
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ (target_brightness | float(0)) <= 0 and (non_dimmable_on | length) > 0 and (flag_entity_id == '' or states(flag_entity_id) == 'on') and (lock_token_entity_id == '' or states(lock_token_entity_id) == lock_token_value) }}"
                    sequence:
                      - service: light.turn_off
                        target:
                          entity_id: "{{ non_dimmable_on | join(', ') }}"
              - repeat:
                  for_each: "{{ dimmable_lights }}"
                  sequence:
                    - choose:
                        - conditions:
                            - condition: template
                              value_template: "{{ flag_entity_id != '' and states(flag_entity_id) != 'on' }}"
                          sequence:
                            - stop: "Flag inactive"
                        - conditions:
                            - condition: template
                              value_template: "{{ lock_token_entity_id != '' and states(lock_token_entity_id) != lock_token_value }}"
                          sequence:
                            - stop: "Lock token changed"
                    - service: script.gradual_brightness_worker
                      data:
                        variables:
                          light: "{{ repeat.item }}"
                          target_brightness: "{{ target_brightness }}"
                          steps: "{{ steps_int }}"
                          step_delay_ms: "{{ step_delay_ms }}"
                          flag_entity: "{{ flag_entity_id }}"
                          lock_token_entity: "{{ lock_token_entity_id }}"
                          lock_token: "{{ lock_token_value }}"
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ (target_brightness | float(0)) > 0 and (non_dimmable_off | length) > 0 and (flag_entity_id == '' or states(flag_entity_id) == 'on') and (lock_token_entity_id == '' or states(lock_token_entity_id) == lock_token_value) }}"
                    sequence:
                      - service: light.turn_on
                        target:
                          entity_id: "{{ non_dimmable_off | join(', ') }}"
              - stop: "Queue ramp done"

  gradual_brightness_worker:
    alias: Gradual Brightness Worker
    mode: parallel
    fields:
      light:
        name: Light entity
        selector:
          entity:
            domain: light
      target_brightness:
        name: Target Brightness (%)
        selector:
          number:
            min: 0
            max: 100
            step: 1
      steps:
        name: Steps
        selector:
          number:
            min: 1
            max: 100
            step: 1
      step_delay_ms:
        name: Step delay (ms)
        selector:
          number:
            min: 0
            max: 5000
            step: 10
      flag_entity:
        name: Run flag entity
        description: Optional input_boolean that remains 'on' while this worker should keep running.
        selector:
          entity:
            domain: input_boolean
      lock_token_entity:
        name: Lock token entity
        description: Optional input_text token entity used to stop stale workers.
        selector:
          entity:
            domain: input_text
      lock_token:
        name: Lock token
        description: Expected token value while the worker is allowed to run.
        selector:
          text:
    sequence:
      - variables:
          is_off: "{{ states(light) == 'off' }}"
          run_flag: "{{ flag_entity | default('') }}"
          lock_entity: "{{ lock_token_entity | default('') }}"
          lock_value: "{{ lock_token | default('') }}"
          start_bri: "{{ state_attr(light, 'brightness') | int(0) }}"
          start_pct: "{{ (10 if is_off else (start_bri / 255 * 100)) | float }}"
          target_pct: "{{ target_brightness | float }}"
          delta: "{{ target_pct - start_pct }}"
          step_size: "{{ (delta | float) / (steps | float) }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ run_flag != '' and states(run_flag) != 'on' }}"
            sequence:
              - stop: "Flag inactive before start"
          - conditions:
              - condition: template
                value_template: "{{ lock_entity != '' and states(lock_entity) != lock_value }}"
            sequence:
              - stop: "Lock token changed before start"
      - if:
          - condition: template
            value_template: "{{ is_off and (delta | float) > 0 and (lock_entity == '' or states(lock_entity) == lock_value) }}"
        then:
          - service: light.turn_on
            target:
              entity_id: "{{ light }}"
            data:
              brightness: 25
      - if:
          - condition: template
            value_template: "{{ (delta | float) == 0 or (is_off and (delta | float) <= 0) }}"
        then: []
        else:
          - repeat:
              count: "{{ steps | int }}"
              sequence:
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ run_flag != '' and states(run_flag) != 'on' }}"
                      sequence:
                        - stop: "Flag inactive during run"
                    - conditions:
                        - condition: template
                          value_template: "{{ lock_entity != '' and states(lock_entity) != lock_value }}"
                      sequence:
                        - stop: "Lock token changed during run"
                - variables:
                    new_pct: "{{ (start_pct | float) + ((repeat.index | float) * (step_size | float)) }}"
                    new_pct_clamped: "{{ ([new_pct | float, 1.0] | max) if (target_pct | float) <= 0 else ([new_pct | float, 100.0] | min) }}"
                    new_brightness: "{{ (((new_pct_clamped | float) / 100.0) * 255.0) | round(0) | int }}"
                - service: light.turn_on
                  target:
                    entity_id: "{{ light }}"
                  data:
                    brightness: "{{ new_brightness }}"
                - delay:
                    milliseconds: "{{ step_delay_ms | int }}"
          - if:
              - condition: template
                value_template: "{{ (target_pct | float) <= 0 and (lock_entity == '' or states(lock_entity) == lock_value) }}"
            then:
              - service: light.turn_off
                target:
                  entity_id: "{{ light }}"
  gradual_restore_from_snapshot:
    alias: Snapshot - Encendido suave desde snapshot
    description: Transicion hacia los brillos guardados en un var JSON de snapshot.
    mode: parallel
    fields:
      snapshot_var:
        description: Entidad var que contiene el JSON de targets por luz
        default: var.smart_light_sala_snapshot_targets
      duration:
        description: Duración total en segundos
        default: 10
      steps:
        description: Número de pasos
        default: 20
      min_pct:
        description: Piso mínimo de brillo (para luces que no aceptan menos)
        default: 10
      lock_token_entity:
        description: Optional input_text token entity used to stop stale restores.
        selector:
          entity:
            domain: input_text
      lock_token:
        description: Expected token value while the restore is allowed to run.
        selector:
          text:
    sequence:
      - variables:
          snapshot_var_entity: "{{ snapshot_var | default('var.smart_light_sala_snapshot_targets') }}"
          targets: >
            {{ states(snapshot_var_entity) | default('{}', true) | from_json }}
          luces: "{{ (targets.keys() if targets is mapping else []) | list }}"
          steps_i: "{{ (steps | default(30)) | int }}"
          duration_s: "{{ (duration | default(10)) | float }}"
          intervalo_ms: >
            {{ (duration_s * 1000 / (steps_i if steps_i > 0 else 1)) | round(0) | int }}
          min_floor: "{{ (min_pct | default(10)) | int }}"
          lock_entity: "{{ lock_token_entity | default('') }}"
          lock_value: "{{ lock_token | default('') }}"
          lock_valid: "{{ lock_entity == '' or states(lock_entity) == lock_value }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ luces | length == 0 or steps_i <= 0 or (lock_entity != '' and states(lock_entity) != lock_value) }}"
            sequence: []
        default:
          - repeat:
              count: "{{ steps_i }}"
              sequence:
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ lock_entity != '' and states(lock_entity) != lock_value }}"
                      sequence:
                        - stop: "Lock token changed during restore"
                - variables:
                    idx: "{{ repeat.index }}"
                    frac: "{{ (repeat.index | float) / (steps_i | float) }}"
                - repeat:
                    for_each: "{{ luces }}"
                    sequence:
                      - variables:
                          e: "{{ repeat.item }}"
                          objetivo: "{{ targets[e] | int }}"
                          bri_cur_255: >
                            {{ state_attr(e,'brightness') | default(0, true) | int }}
                          pct0: "{{ (bri_cur_255 / 2.55) | round(0) | int }}"
                          start: |
                            {% if objetivo > 0 %}
                              {{ pct0 if pct0 > 0 else min_floor }}
                            {% else %}
                              {{ pct0 }}
                            {% endif %}
                          next_raw: >
                            {{ (start + (frac | float) * (objetivo - start)) | round(0) | int }}
                          next_pct: |
                            {% if objetivo > 0 %}
                              {{ [ [ next_raw, 0 ] | max, min_floor ] | max | int }}
                            {% else %}
                              {{ [ next_raw, 0 ] | max | int }}
                            {% endif %}
                      - target:
                          entity_id: "{{ e }}"
                        data:
                          brightness_pct: "{{ next_pct }}"
                        action: light.turn_on
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: "{{ objetivo == 0 and idx == steps_i and (lock_entity == '' or states(lock_entity) == lock_value) }}"
                            sequence:
                              - target:
                                  entity_id: "{{ e }}"
                                action: light.turn_off
                                data: {}
                - delay:
                    milliseconds: "{{ intervalo_ms }}"















