# ============================================
# Recorder Exclusions Package
# ============================================
# Excluye entidades del recorder para mejorar
# el rendimiento de la base de datos
# ============================================

recorder:
  # Excluir entidades específicas que causan problemas
  exclude:
    entities:
      # Bubble Card Modules - Atributos exceden 16KB
      # Causa: State attributes exceed maximum size of 16384 bytes
      # Solución: No registrar en la base de datos
      - sensor.bubble_card_modules
      
    # Opcional: Excluir otros sensores problemáticos
    # Descomenta y agrega según necesites:
    # entity_globs:
    #   - sensor.bubble_card_*
    
  # Opcional: Incluir solo dominios específicos
  # include:
  #   domains:
  #     - light
  #     - switch
  #     - climate
  #     - sensor
  #     - binary_sensor

# ============================================
# NOTAS:
# ============================================
# - sensor.bubble_card_modules es una entidad interna
#   de Bubble Card que almacena configuración de módulos
# - Sus atributos pueden exceder 16KB causando warnings
# - No es necesario registrar su historial en la DB
# - Esta exclusión no afecta el funcionamiento de Bubble Card
# ============================================