# ===========================================
# Package: yendo_a_dormir_v2
# Llama a script externo: script.gradual_brightness_change
# Descripcion:
#   Rutina para ir a dormir:
#     - Al activar input_boolean.yendo_a_dormir:
#         - Activa input_boolean.modo_dormir_activo
#         - Toma control protegido de sala_de_estar mientras dura la rutina
#         - Desactiva smart_lights_sala
#         - Cancela timers de Smart Light Sala y propios
#         - Guarda escena actual de sala_de_estar
#         - Ejecuta script.dormir_01_inicio
#         - Inicia countdown de fade + espera
#         - Baja luces gradualmente a target %
#     - Al finalizar el countdown:
#         - Ejecuta acciones finales
#         - Libera el control protegido de sala
#         - Reactiva Smart Lights Sala y recalcula por motion
#         - Deja modo_dormir_activo encendido
# ===========================================

###############################################################
# HELPERS
###############################################################

input_boolean:
  yendo_a_dormir:
    name: Dormir - Yendo a dormir
    initial: off
  modo_dormir_activo:
    name: Dormir - Modo dormir activo
  horario_de_dormir:
    name: Horario de dormir
    initial: off

input_number:
  dormir_reduccion_pct:
    name: Dormir - Target %
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 10
  dormir_fade_sec:
    name: Dormir - Fade (s)
    min: 5
    max: 600
    step: 5
    unit_of_measurement: s
    initial: 10
  dormir_wait_after_sec:
    name: Dormir - Espera luego del fade (s)
    min: 0
    max: 900
    step: 10
    unit_of_measurement: s
    initial: 20

###############################################################
# TIMER PROPIO (para countdown en UI)
###############################################################
timer:
  dormir_countdown:
    name: Countdown iniciando dormir
    duration: "00:01:00"   # se sobreescribe dinamicamente
    restore: true
 
###############################################################
# SCRIPTS (utilitarios locales)
###############################################################
script:

  dormir_save_scene:
    alias: Dormir - Guardar escena sala
    mode: parallel
    sequence:
      - variables:
          leaf_lights: >
            {% set ns = namespace(leaf=[]) %}
            {% for l in area_entities('sala_de_estar') | select('match','light\\..*') %}
              {% set m = state_attr(l,'entity_id') %}
              {% set ns.leaf = ns.leaf + (m if m else [l]) %}
            {% endfor %}
            {{ ns.leaf | unique | list }}
      - service: scene.create
        data:
          scene_id: dormir_snapshot
          snapshot_entities: "{{ leaf_lights }}"

  dormir_turn_off_area:
    alias: Dormir - Apagar sala
    mode: parallel
    sequence:
      - service: light.turn_off
        target:
          area_id: sala_de_estar

  dormir_sequential_off:
    alias: "dormir_sequential_off"
    description: Apagar luces una por una, dejar 1 encendida.
    mode: single
    sequence:
      - variables:
          leaf_lights: >
            {% set ns = namespace(leaf=[]) %}
            {% for l in area_entities('sala_de_estar') | select('match','light\\..*') %}
              {% set m = state_attr(l,'entity_id') %}
              {% set ns.leaf = ns.leaf + (m if m else [l]) %}
            {% endfor %}
            {{ ns.leaf | unique | list }}
          on_lights: >
            {{ expand(leaf_lights) | selectattr('state','equalto','on') | map(attribute='entity_id') | list }}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ on_lights | length > 1 }}"
            sequence:
              - repeat:
                  count: "{{ on_lights | length - 1 }}"
                  sequence:
                    - service: light.turn_off
                      target: { entity_id: "{{ on_lights[repeat.index] }}" }
                    - delay: 4
        default: []

###############################################################
# AUTOMATIONS
###############################################################
automation:
  - alias: Dormir - ON start
    id: dormir_on_start
    mode: restart
    trigger:
      - platform: state
        entity_id: input_boolean.yendo_a_dormir
        to: "on"
    variables:
      fade_s: "{{ states('input_number.dormir_fade_sec') | int(60) }}"
      wait_s: "{{ states('input_number.dormir_wait_after_sec') | int(120) }}"
      total_s: "{{ fade_s + wait_s }}"
      pct: "{{ states('input_number.dormir_reduccion_pct') | int(10) }}"
      sleep_lock_token: "sleep_{{ now().timestamp() }}"
    action:
      - service: input_boolean.turn_on
        target: { entity_id: input_boolean.modo_dormir_activo }

      - service: script.light_transition_claim_area
        data:
          area_key: sala_de_estar
          owner: sleep
          token: "{{ sleep_lock_token }}"
          protected: true
          force: true

      - service: input_boolean.turn_off
        target: { entity_id: input_boolean.smart_lights_sala }

      - service: timer.cancel
        target:
          entity_id:
            - timer.smart_light_sala_idle_timeout
            - timer.smart_light_sala_dim_notice
            - timer.smart_light_sala_restore_window
            - timer.dormir_countdown

      - service: script.dormir_save_scene

      - service: script.dormir_01_inicio
      - wait_template: "{{ is_state('script.dormir_01_inicio', 'off') }}"
        timeout: "00:05:00"
        continue_on_timeout: false

      - condition: state
        entity_id: input_boolean.yendo_a_dormir
        state: "on"
      - condition: template
        value_template: "{{ states('input_text.light_transition_sala_owner') == 'sleep' }}"

      - service: timer.start
        target: { entity_id: timer.dormir_countdown }
        data:
          duration: "{{ total_s }}"

      - service: script.gradual_brightness_change
        data:
          target:
            area_id: sala_de_estar
          target_brightness: "{{ pct }}"
          transition_time: "{{ fade_s }}"
          steps: "{{ fade_s }}"
          queue_mode: parallel
          include_off_lights: false
          lock_token_entity: input_text.light_transition_sala_token
          lock_token: "{{ sleep_lock_token }}"

  - alias: Dormir - FIN countdown
    id: dormir_finish
    mode: single
    trigger:
      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.dormir_countdown
    condition:
      - condition: state
        entity_id: input_boolean.yendo_a_dormir
        state: "on"
    action:
      - service: input_boolean.turn_on
        target: { entity_id: input_boolean.modo_dormir_activo }

      - service: script.dormir_03_final
      - wait_template: "{{ is_state('script.dormir_03_final', 'off') }}"
        timeout: "00:05:00"
        continue_on_timeout: false

      - condition: state
        entity_id: input_boolean.yendo_a_dormir
        state: "on"
      - condition: template
        value_template: "{{ states('input_text.light_transition_sala_owner') == 'sleep' }}"

      - service: script.dormir_sequential_off
      - wait_template: "{{ is_state('script.dormir_sequential_off', 'off') }}"
        timeout: "00:15:00"
        continue_on_timeout: false

      - condition: state
        entity_id: input_boolean.yendo_a_dormir
        state: "on"
      - delay: 2

      - service: scene.turn_on
        target: { entity_id: scene.madrugada1 }
        data: {}

      - service: input_select.select_option
        target: { entity_id: input_select.smart_light_sala_state }
        data: { option: WAITING_ARRIVAL }

      - service: script.light_transition_release_area
        data:
          area_key: sala_de_estar
          owner: sleep
          force: true

      - service: input_boolean.turn_on
        target: { entity_id: input_boolean.smart_lights_sala }

      - service: script.smart_light_sala_reset_runtime

      - service: input_boolean.turn_off
        target: { entity_id: input_boolean.yendo_a_dormir }

  - alias: Dormir - OFF cancel + restore
    id: dormir_off_cancel
    mode: restart
    trigger:
      - platform: state
        entity_id: input_boolean.yendo_a_dormir
        to: "off"
    condition:
      - condition: template
        value_template: >
          {{ is_state('timer.dormir_countdown', 'active')
             or states('input_text.light_transition_sala_owner') == 'sleep' }}
    action:
      - service: timer.cancel
        target: { entity_id: timer.dormir_countdown }

      - service: script.light_transition_claim_area
        data:
          area_key: sala_de_estar
          owner: sleep
          token: "sleep_cancel_{{ now().timestamp() }}"
          protected: true
          force: true

      - service: scene.turn_on
        target: { entity_id: scene.dormir_snapshot }

      - service: input_boolean.turn_off
        target: { entity_id: input_boolean.modo_dormir_activo }

      - service: input_select.select_option
        target: { entity_id: input_select.smart_light_sala_state }
        data: { option: WAITING_ARRIVAL }

      - delay: "00:00:02"

      - service: script.light_transition_release_area
        data:
          area_key: sala_de_estar
          owner: sleep
          force: true

      - service: input_boolean.turn_on
        target: { entity_id: input_boolean.smart_lights_sala }

      - service: script.smart_light_sala_reset_runtime

  - alias: Dormir - Modo dormir OFF -> release sala
    id: dormir_modo_off_release_sala
    mode: restart
    trigger:
      - platform: state
        entity_id: input_boolean.modo_dormir_activo
        to: "off"
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.yendo_a_dormir
                state: "on"
            sequence:
              - service: input_boolean.turn_off
                target: { entity_id: input_boolean.yendo_a_dormir }
              - stop: "La cancelacion de yendo_a_dormir completa la limpieza"
      - service: timer.cancel
        target: { entity_id: timer.dormir_countdown }
      - service: script.light_transition_release_area
        data:
          area_key: sala_de_estar
          owner: sleep
          force: true
      - service: input_boolean.turn_on
        target: { entity_id: input_boolean.smart_lights_sala }
      - service: script.smart_light_sala_reset_runtime

  - alias: Dormir - HA START -> recover runtime
    id: dormir_ha_start_recover_runtime
    mode: single
    trigger:
      - platform: homeassistant
        event: start
    action:
      - delay: "00:00:10"
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.yendo_a_dormir
                state: "on"
              - condition: state
                entity_id: timer.dormir_countdown
                state: "active"
            sequence:
              - service: input_boolean.turn_on
                target: { entity_id: input_boolean.modo_dormir_activo }
              - service: script.light_transition_claim_area
                data:
                  area_key: sala_de_estar
                  owner: sleep
                  token: "sleep_recover_{{ now().timestamp() }}"
                  protected: true
                  force: true
              - service: input_boolean.turn_off
                target: { entity_id: input_boolean.smart_lights_sala }
          - conditions:
              - condition: state
                entity_id: input_boolean.yendo_a_dormir
                state: "on"
            sequence:
              - service: input_boolean.turn_off
                target: { entity_id: input_boolean.yendo_a_dormir }
              - service: script.light_transition_release_area
                data:
                  area_key: sala_de_estar
                  owner: sleep
                  force: true
              - service: input_boolean.turn_on
                target: { entity_id: input_boolean.smart_lights_sala }
              - service: script.smart_light_sala_reset_runtime
          - conditions:
              - condition: state
                entity_id: input_boolean.modo_dormir_activo
                state: "on"
            sequence:
              - service: script.light_transition_release_area
                data:
                  area_key: sala_de_estar
                  owner: sleep
                  force: true

  - alias: Horario dormir - ON at 22:00
    id: horario_dormir_on
    mode: single
    trigger:
      - platform: time
        at: "22:00:00"
    action:
      - service: input_boolean.turn_on
        target: { entity_id: input_boolean.horario_de_dormir }

  - alias: Horario dormir - OFF at 02:00
    id: horario_dormir_off
    mode: single
    trigger:
      - platform: time
        at: "02:00:00"
    action:
      - service: input_boolean.turn_off
        target: { entity_id: input_boolean.horario_de_dormir }

  - alias: dormir_off
    id: dormir_off
    mode: single
    trigger:
      - platform: time
        at: "08:00:00"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.modo_dormir_activo
            - input_boolean.yendo_a_dormir
      - service: timer.cancel
        target: { entity_id: timer.dormir_countdown }
      - service: script.light_transition_release_area
        data:
          area_key: sala_de_estar
          owner: sleep
          force: true

  - alias: Horario dormir - Sync al reiniciar HA
    id: horario_dormir_sync_on_start
    mode: single
    trigger:
      - platform: homeassistant
        event: start
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ now().hour >= 22 or now().hour < 2 }}"
            sequence:
              - service: input_boolean.turn_on
                target: { entity_id: input_boolean.horario_de_dormir }
        default:
          - service: input_boolean.turn_off
            target: { entity_id: input_boolean.horario_de_dormir }
