# packages/bienvenida_tts.yaml

input_text:
  nombre_bienvenida:
    name: Nombre de bienvenida
    icon: mdi:account-voice
    max: 40
    pattern: '.*'   # permite cualquier texto

script:
  bienvenida_tts:
    alias: "Bienvenida TTS"
    description: "Dice: 'Hola, (nombre). Bienvenido a casa' usando Nabu Casa TTS."
    fields:
      speaker:
        name: Reproductor
        description: Media player donde se reproducirá el audio
        selector:
          entity:
            domain: media_player
      nombre_helper:
        name: Helper del nombre
        description: Input_text desde donde se lee el nombre
        default: input_text.nombre_bienvenida
        selector:
          entity:
            domain: input_text
    sequence:
      - variables:
          _speaker: "{{ speaker }}"
          _nombre: "{{ states(nombre_helper) | trim }}"
          _mensaje: "Hola, {{ _nombre if _nombre else 'invitado' }}. Bienvenido a casa."
          
      - alias: "Intención principal con Nabu Casa TTS"
        service: tts.cloud_say
        target:
          entity_id: "{{ _speaker }}"
        data:
          message: "{{ _mensaje }}"
          cache: true
          language: es-ES
        continue_on_error: true   # <--- Si falla, el script NO se detiene
        
      - alias: "Espera breve para darle tiempo a conectar"
        delay: "00:00:01"
        
      - alias: "Fallback si no está reproduciendo"
        if:
          - condition: template
            value_template: "{{ not is_state(_speaker, 'playing') }}"
        then:
          - alias: "Usar Google Translate como respaldo"
            service: tts.google_translate_say
            target:
              entity_id: "{{ _speaker }}"
            data:
              message: "{{ _mensaje }}"
              language: es
            # Opcional: Podés cambiar google_translate_say por piper si querés todo 100% local
    mode: restart