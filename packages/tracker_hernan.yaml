# ======================================
# UBICACIÓN HERNÁN (Wi‑Fi + GPS) — robusto
# Resultados: home / office / away
# ======================================

template:
  - trigger:
      - platform: state
        entity_id:
          - sensor.samsungs24u_wi_fi_connection
          - device_tracker.samsungs24u
      - platform: homeassistant
        event: start
    sensor:
      - name: "ubicacion_hernan"
        icon: mdi:map-marker-account
        availability: >-
          {{ has_value('sensor.samsungs24u_wi_fi_connection')
             or has_value('device_tracker.samsungs24u') }}
        state: >-
          {% set wifi = states('sensor.samsungs24u_wi_fi_connection') | default('', true) | lower | trim %}
          {% if wifi == 'casa' %}
            office
          {% elif wifi in ['miracle', 'miracle 5'] %}
            home
          {% else %}
            {% set gps = states('device_tracker.samsungs24u') | default('', true) %}
            {% if gps in ['home','office'] %}
              {{ gps }}
            {% else %}
              away
            {% endif %}
          {% endif %}
        attributes:
          wifi_ssid: "{{ states('sensor.samsungs24u_wi_fi_connection') | default('unknown', true) }}"
          gps_state: "{{ states('device_tracker.samsungs24u') | default('unknown', true) }}"

  - binary_sensor:
      # Sensores auxiliares (útiles para conditions en automations)
      - name: "hernan_en_casa"
        icon: mdi:home-account
        state: "{{ is_state('sensor.ubicacion_hernan','home') }}"
      - name: "hernan_en_oficina"
        icon: mdi:office-building-marker
        state: "{{ is_state('sensor.ubicacion_hernan','office') }}"
      - name: "hernan_away"
        icon: mdi:walk
        state: "{{ is_state('sensor.ubicacion_hernan','away') }}"


# ===========================================
# PERSON.HERNAN desde sensor.ubicacion_hernan
# Mapea office -> oficina (tu zona)
# ===========================================

automation:
  - alias: Person - Ubicación virtual (crear/actualizar)
    id: person_hernan_virtual_update
    mode: queued
    max: 3
    trigger:
      - platform: state
        entity_id: sensor.ubicacion_hernan
      - platform: homeassistant
        event: start
    condition:
      - condition: template
        value_template: "{{ states('sensor.ubicacion_hernan') in ['home','office','away'] }}"
    action:
      - variables:
          estado: "{{ states('sensor.ubicacion_hernan') }}"
          destino: >-
            {% if estado == 'away' %}
              not_home
            {% elif estado == 'office' %}
              oficina         {# <- nombre EXACTO de tu zona #}
            {% else %}
              home
            {% endif %}
      - service: device_tracker.see
        data:
          dev_id: hernan_virtual # => device_tracker.hernan_virtual
          host_name: "Hernán (virtual)"
          location_name: "{{ destino }}"
          source_type: gps
